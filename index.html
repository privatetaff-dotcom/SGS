<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGS — Gestion des postes de travail</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #161616;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    nav {
      background: #000;
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #2a2a2a;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #cc0000;
      text-transform: uppercase;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, #1a1a1a 0%, #111 100%);
      border-bottom: 1px solid #2a2a2a;
      padding: 2.5rem 2rem;
    }

    .hero h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 1.75rem;
      letter-spacing: 0.02em;
    }

    .stats {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #cc0000;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
    }

    /* ── Grid ── */
    main {
      flex: 1;
      padding: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    /* ── Card ── */
    .card {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1rem;
      border-bottom: 1px solid #2a2a2a;
      background: #222;
    }

    .card-title {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #fff;
      text-transform: uppercase;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3cba5f;
      flex-shrink: 0;
    }

    .status-dot.red { background: #cc0000; }

    .card-body {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    .field label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 0.35rem;
    }

    .field-value {
      min-height: 36px;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      color: #444;
    }

    /* ── Minerai list ── */
    .minerai-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .minerai-btn {
      background: #2a2a2a;
      border: 1px solid #383838;
      border-radius: 4px;
      color: #bbb;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 0.3rem 0.6rem;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .minerai-btn:hover {
      background: #333;
      color: #fff;
      border-color: #555;
    }

    .minerai-btn.active {
      background: #cc0000;
      border-color: #cc0000;
      color: #fff;
    }

    /* ── Treatment detail ── */
    .treatment-detail {
      display: none;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 0.6rem 0.75rem;
      font-size: 0.8rem;
      color: #888;
      font-style: italic;
    }

    .treatment-detail.visible {
      display: block;
    }

    .treatment-detail .prelevement {
      font-style: normal;
      font-weight: 600;
      color: #cc0000;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .treatment-detail ol {
      padding-left: 1.1rem;
      font-style: normal;
      color: #ccc;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .treatment-detail ol li {
      font-size: 0.8rem;
      line-height: 1.5;
    }

    .treatment-detail ul {
      padding-left: 1rem;
      margin-top: 0.35rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      list-style: disc;
    }

    .treatment-detail ul li {
      font-size: 0.78rem;
      color: #aaa;
    }

    .heure-badge {
      background: #cc0000;
      color: #fff;
      font-weight: 700;
      font-size: 0.75rem;
      padding: 0.1rem 0.45rem;
      border-radius: 3px;
      letter-spacing: 0.04em;
    }

    /* ── Safety card ── */
    .card.safety {
      background: #1a0505;
      border-color: #4a1010;
    }

    .card.safety .card-header {
      background: #220808;
      border-bottom-color: #4a1010;
    }

    .card.safety .field-value {
      background: #120303;
      border-color: #4a1010;
    }

    /* ── Footer ── */
    footer {
      background: #000;
      border-top: 1px solid #2a2a2a;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #555;
    }

    footer span { letter-spacing: 0.04em; }
  </style>
</head>
<body>

  <nav>
    <span class="logo">SGS</span>
  </nav>

  <section class="hero">
    <h1>Gestion des postes de travail</h1>
    <div class="stats">
      <div class="stat">
        <span class="stat-value">6</span>
        <span class="stat-label">Postes</span>
      </div>
      <div class="stat">
        <span class="stat-value">—</span>
        <span class="stat-label">Échantillons</span>
      </div>
      <div class="stat">
        <span class="stat-value">—</span>
        <span class="stat-label">En cours</span>
      </div>
    </div>
  </section>

  <main>
    <div class="grid">

      <!-- P1 -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">P1</span>
          <span class="status-dot"></span>
        </div>
        <div class="card-body">
          <div class="field">
            <label>Type de minerai</label>
            <div class="minerai-list" data-card="p1">
              <button class="minerai-btn" data-card="p1" data-minerai="KSP">KSP</button>
              <button class="minerai-btn" data-card="p1" data-minerai="KSP5">KSP5</button>
              <button class="minerai-btn" data-card="p1" data-minerai="CFO">CFO</button>
              <button class="minerai-btn" data-card="p1" data-minerai="SFR">SFR</button>
              <button class="minerai-btn" data-card="p1" data-minerai="CAO">CAO</button>
              <button class="minerai-btn" data-card="p1" data-minerai="ABO">ABO</button>
              <button class="minerai-btn" data-card="p1" data-minerai="COKERIE" data-heure="10h">COKERIE</button>
            </div>
          </div>
          <div class="field">
            <label>Traitement</label>
            <div class="treatment-detail" id="treatment-p1">Traitement à renseigner</div>
          </div>
        </div>
      </div>

      <!-- P2 -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">P2</span>
          <span class="status-dot"></span>
        </div>
        <div class="card-body">
          <div class="field">
            <label>Type de minerai</label>
            <div class="minerai-list" data-card="p2">
              <button class="minerai-btn" data-card="p2" data-minerai="KSP">KSP</button>
              <button class="minerai-btn" data-card="p2" data-minerai="KSP5">KSP5</button>
              <button class="minerai-btn" data-card="p2" data-minerai="CFO">CFO</button>
              <button class="minerai-btn" data-card="p2" data-minerai="SFR">SFR</button>
              <button class="minerai-btn" data-card="p2" data-minerai="CAO">CAO</button>
              <button class="minerai-btn" data-card="p2" data-minerai="ABO">ABO</button>
              <button class="minerai-btn" data-card="p2" data-minerai="COKERIE" data-heure="18h">COKERIE</button>
            </div>
          </div>
          <div class="field">
            <label>Traitement</label>
            <div class="treatment-detail" id="treatment-p2">Traitement à renseigner</div>
          </div>
        </div>
      </div>

      <!-- P3 -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">P3</span>
          <span class="status-dot"></span>
        </div>
        <div class="card-body">
          <div class="field">
            <label>Type de minerai</label>
            <div class="minerai-list" data-card="p3">
              <button class="minerai-btn" data-card="p3" data-minerai="KSP">KSP</button>
              <button class="minerai-btn" data-card="p3" data-minerai="KSP5">KSP5</button>
              <button class="minerai-btn" data-card="p3" data-minerai="CFO">CFO</button>
              <button class="minerai-btn" data-card="p3" data-minerai="SFR">SFR</button>
              <button class="minerai-btn" data-card="p3" data-minerai="CAO">CAO</button>
              <button class="minerai-btn" data-card="p3" data-minerai="ABO">ABO</button>
              <button class="minerai-btn" data-card="p3" data-minerai="COKERIE" data-heure="2h">COKERIE</button>
            </div>
          </div>
          <div class="field">
            <label>Traitement</label>
            <div class="treatment-detail" id="treatment-p3">Traitement à renseigner</div>
          </div>
        </div>
      </div>

      <!-- Quai -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Quai</span>
          <span class="status-dot"></span>
        </div>
        <div class="card-body">
          <div class="field">
            <label>Type de minerai</label>
            <div class="field-value"></div>
          </div>
          <div class="field">
            <label>Traitement</label>
            <div class="field-value"></div>
          </div>
        </div>
      </div>

      <!-- Co produit -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Co produit</span>
          <span class="status-dot"></span>
        </div>
        <div class="card-body">
          <div class="field">
            <label>Type de minerai</label>
            <div class="field-value"></div>
          </div>
          <div class="field">
            <label>Traitement</label>
            <div class="field-value"></div>
          </div>
        </div>
      </div>

      <!-- Règle de sécurité -->
      <div class="card safety">
        <div class="card-header">
          <span class="card-title">Règle de sécurité</span>
          <span class="status-dot red"></span>
        </div>
        <div class="card-body">
          <div class="field">
            <label>Consigne</label>
            <div class="field-value"></div>
          </div>
          <div class="field">
            <label>Équipement requis</label>
            <div class="field-value"></div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <span>SGS Minerai · Site industriel</span>
    <span>v1.0</span>
  </footer>

  <script>
    function buildTreatmentHTML(minerai, heure, card) {
      if (minerai === 'COKERIE') {
        const humiditeSteps = {
          p1: `<li><em>Plateau humidité</em> : peser, inscrire sur la feuille, mettre le plateau humidité de P3 dans le sachet charbon cokerie, ramener le sachet complet à la cokerie <strong>avant 8h</strong>, puis créer un nouveau sachet avec l'inscription <strong>Charbon cokerie P1-P2-P3 + date</strong>.</li>`,
          p2: `<li><em>Plateau humidité</em> : peser, inscrire sur la feuille, mettre le plateau humidité de P1 dans le sachet charbon cokerie en cours.</li>`,
          p3: `<li><em>Plateau humidité</em> : peser, inscrire sur la feuille, mettre le plateau humidité de P2 dans le sachet charbon cokerie en cours.</li>`,
        };
        return `
          <ol>
            <li>
              <strong>Récupérer la cokerie de l'équipe précédente</strong> (en étuve depuis 4h) :
              <ul>
                <li><em>Plateau granulo</em> : tamiser aux mailles 200µm, 500µm, 1mm, 2mm, 3mm, 5mm, 10mm, 20mm — peser chaque fraction et inscrire sur la feuille.</li>
                ${humiditeSteps[card]}
                <li>Renseigner les chiffres sur le rapport.</li>
              </ul>
            </li>
            <li><strong>Prélever la cokerie de l'équipe en cours</strong> à <span class="heure-badge">${heure}</span>.</li>
            <li>Diviser dans le diviseur.</li>
            <li>Faire le sachet brut avec inscription : <strong>Cokerie brut + date + équipe</strong>.</li>
            <li>Préparer les plateaux granulo et humidité, peser le plateau humidité et inscrire le poids humide sur la feuille, puis mettre les deux plateaux à l'étuve.</li>
          </ol>`;
      }
      return 'Traitement à renseigner';
    }

    document.querySelectorAll('.minerai-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const card = btn.dataset.card;
        const detail = document.getElementById('treatment-' + card);
        const isActive = btn.classList.contains('active');

        document.querySelectorAll(`.minerai-btn[data-card="${card}"]`).forEach(b => b.classList.remove('active'));

        if (isActive) {
          detail.classList.remove('visible');
          detail.innerHTML = '';
        } else {
          btn.classList.add('active');
          detail.innerHTML = buildTreatmentHTML(btn.dataset.minerai, btn.dataset.heure, card);
          detail.classList.add('visible');
        }
      });
    });
  </script>

</body>
</html>
